<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Simul High Scores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="stylesheet" href="scoreboard.css?v=8">
</head>
<body class="scoreboard">

  <img src="altimate-logo.svg" alt="Altimate AI" class="scoreboard-logo">

  <h1 class="scoreboard-title">
    <span class="chess-icon">&#9823;</span>
    Gartner Data &amp; Analytics Summit Chess Challenge: High Scores
    <span class="chess-icon">&#9823;</span>
  </h1>

  <!-- Winners + Next Up Row -->
  <div style="display: flex; gap: 2vw; width: 100%; max-width: 900px; margin-bottom: 1.5vh; align-items: flex-start;">
    <div class="winners-section" style="flex: 2; margin-bottom: 0;">
      <div class="section-label">&#127942; WINNERS &mdash; TOP 3 <span style="font-weight:400; opacity:0.7;">(Wins ranked first by fastest checkmate, then draws &amp; losses by time survived)</span></div>
      <div id="winners-list"></div>
      <div id="tie-note" class="tie-note hidden"></div>
    </div>
    <div class="next-up-section" style="flex: 1;">
      <div class="section-label">Next Up</div>
      <div id="next-up-list"></div>
    </div>
  </div>

  <!-- Runners Up + QR Code Row -->
  <div style="display: flex; gap: 2vw; width: 100%; max-width: 900px; margin-bottom: 1.5vh; align-items: flex-start;">
    <div class="runners-section" style="flex: 2; margin-bottom: 0;">
      <div class="section-label">RUNNERS UP</div>
      <div id="runners-list"></div>
    </div>
    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1vh;">
      <a href="https://frasermarlow.github.io/chess-simul-scoreboard/join.html"><img src="chess-simul.png" alt="Scan to join" style="width: 100%; height: auto; border-radius: 8px;"></a>
      <span style="font-family: 'Lexend', sans-serif; font-weight: 600; font-size: clamp(0.7rem, 1.2vw, 1rem); color: #5E7493; text-align: center;">Scan to join!</span>
    </div>
  </div>

  <!-- Bottom Strip -->
  <div class="bottom-strip">
    <div class="boards-strip">
      <div class="board-badge">
        <span class="board-label">Now Playing</span>
        <span class="board-player" id="now-playing">&mdash;</span>
      </div>
      <div class="board-badge">
        <span class="board-label">In Queue</span>
        <span class="board-player" id="queue-count">0</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getDatabase, ref, onValue }
      from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- Scores listener ---
    const scoresRef = ref(db, 'scores');
    onValue(scoresRef, (snapshot) => {
      const data = snapshot.val();
      const scores = [];
      if (data) {
        for (const key in data) {
          scores.push(data[key]);
        }
      }
      // Sort: less time remaining = better (player lasted longer), bonus boosts rank
      scores.sort((a, b) => {
        const aRank = computeRank(a);
        const bRank = computeRank(b);
        if (bRank !== aRank) return bRank - aRank;
        return a.completedAt - b.completedAt;
      });
      renderScoreboard(scores);
    });

    function formatTime(totalSeconds) {
      if (totalSeconds == null) return '0:00';
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return mins + ':' + String(secs).padStart(2, '0');
    }

    // Convert legacy moves value (e.g. 350 → 3min 50sec = 230s)
    function legacyMovesToSeconds(moves) {
      if (moves == null) return 0;
      const mins = Math.floor(moves / 100);
      const secs = moves % 100;
      return mins * 60 + secs;
    }

    // Compute rank:
    //   Won: always on top, more time remaining = faster win = higher rank
    //   Drew/Lost: less time remaining = lasted longer = higher rank
    function computeRank(score) {
      const time = score.timeRemaining != null ? score.timeRemaining : legacyMovesToSeconds(score.moves);
      if (score.outcome === 'won') return 10000 + time;
      if (score.outcome === 'drew') return 5000 - time;
      return -time;
    }

    function renderScoreboard(scores) {
      const winnersList = document.getElementById('winners-list');
      const runnersList = document.getElementById('runners-list');
      const tieNote = document.getElementById('tie-note');

      // Determine if there's a tie for 3rd place
      let winnersCount = 3;
      let hasTie = false;
      if (scores.length >= 4 && computeRank(scores[2]) === computeRank(scores[3])) {
        winnersCount = 4;
        hasTie = true;
      }

      // Build winners HTML
      let winnersHTML = '';
      for (let i = 0; i < winnersCount; i++) {
        if (i < scores.length) {
          const outcomeIcon = scores[i].outcome === 'won' ? ' 👑' : scores[i].outcome === 'drew' ? ' <span style="font-weight:700; color:#5E7493;">=</span>' : '';
          const timeVal = scores[i].timeRemaining != null ? scores[i].timeRemaining : legacyMovesToSeconds(scores[i].moves);
          winnersHTML += `
            <div class="winner-row">
              <span class="winner-rank">${i + 1}.</span>
              <span class="winner-name">${escapeHTML(scores[i].name)}${outcomeIcon}</span>
              <span class="winner-moves">${formatTime(timeVal)}</span>
            </div>`;
        } else {
          winnersHTML += `
            <div class="winner-row placeholder">
              <span class="winner-rank">${i + 1}.</span>
              <span class="winner-name">---</span>
              <span class="winner-moves">--:--</span>
            </div>`;
        }
      }
      winnersList.innerHTML = winnersHTML;

      // Tie note
      if (hasTie) {
        tieNote.textContent = 'Tie for 3rd — 4 winners!';
        tieNote.classList.remove('hidden');
      } else {
        tieNote.classList.add('hidden');
      }

      // Build runners-up HTML (next 7 after winners)
      let runnersHTML = '';
      const runnersStart = winnersCount;
      const runnersEnd = Math.min(runnersStart + 7, scores.length);
      for (let i = runnersStart; i < runnersEnd; i++) {
        const rOutcomeIcon = scores[i].outcome === 'won' ? ' 👑' : scores[i].outcome === 'drew' ? ' <span style="font-weight:700; color:#5E7493;">=</span>' : '';
        const timeVal = scores[i].timeRemaining != null ? scores[i].timeRemaining : legacyMovesToSeconds(scores[i].moves);
        runnersHTML += `
          <div class="runner-row">
            <span class="runner-rank">${i + 1}.</span>
            <span class="runner-name">${escapeHTML(scores[i].name)}${rOutcomeIcon}</span>
            <span class="runner-moves">${formatTime(timeVal)}</span>
          </div>`;
      }
      runnersList.innerHTML = runnersHTML;
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Queue listener (playing names, queue count, next up) ---
    const queueRef = ref(db, 'queue');
    onValue(queueRef, (snapshot) => {
      const data = snapshot.val();
      const nowPlayingEl = document.getElementById('now-playing');
      const queueCountEl = document.getElementById('queue-count');
      const nextUpEl = document.getElementById('next-up-list');

      if (!data) {
        nowPlayingEl.innerHTML = '&mdash;';
        nowPlayingEl.classList.add('empty');
        queueCountEl.textContent = '0';
        nextUpEl.innerHTML = '<div class="next-up-empty">No one in queue</div>';
        return;
      }

      const entries = Object.values(data);
      const playing = entries.filter(e => e.status === 'playing');
      const queued = entries.filter(e => e.status === 'queued')
        .sort((a, b) => a.queuedAt - b.queuedAt);

      if (playing.length > 0) {
        nowPlayingEl.textContent = playing.map(p => p.name).join(', ');
        nowPlayingEl.classList.remove('empty');
      } else {
        nowPlayingEl.innerHTML = '&mdash;';
        nowPlayingEl.classList.add('empty');
      }

      queueCountEl.textContent = queued.length;

      // Render next 3 in queue
      if (queued.length === 0) {
        nextUpEl.innerHTML = '<div class="next-up-empty">No one in queue</div>';
      } else {
        let html = '';
        html += '<div class="next-up-wrapper">';
        for (let i = 0; i < Math.min(5, queued.length); i++) {
          html += `<div class="next-up-row">
            <span class="next-up-rank">${i + 1}.</span>
            <span class="next-up-name">${escapeHTML(queued[i].name)}</span>
          </div>`;
        }
        html += '</div">';
        if (queued.length > 4) {
          html += `<div class="next-up-more">+${queued.length - 5} more</div>`;
        }
        nextUpEl.innerHTML = html;
      }
    });
  </script>

</body>
</html>
